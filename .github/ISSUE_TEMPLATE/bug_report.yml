name: Bug Report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `docker-compose up`
        2. Navigate to ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Ingestion (JIRA)
        - Ingestion (GitHub)
        - Ingestion (ServiceNow)
        - Capacity input app
        - Scheduler
        - Database
        - Grafana dashboard
        - Docker / infra
        - CI/CD
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"
