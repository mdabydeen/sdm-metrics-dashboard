#################################### PATHS ####################################
[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

#################################### DATABASE ####################################
[database]
type = sqlite3
path = /var/lib/grafana/grafana.db
log_queries =

#################################### AUTH ####################################
[auth]
login_remember_days = 7
cookie_max_age = 2592000

#################################### SMTP ####################################
[smtp]
enabled = false

#################################### RENDERING ####################################
[rendering]
server_url =
callback_url =

#################################### EXPLORE ####################################
[explore]
enabled = true

#################################### GRAFANA.COM INTEGRATION ####################################
[grafana_com]
url = https://grafana.com

#################################### PANELS ####################################
[panels]
disable_sanitize_html = false

#################################### PLUGINS ####################################
[plugins]
allow_ui_updates = true
plugin_admin_enabled = true
plugin_catalog_url = https://grafana.com/grafana/plugins?repo=1

#################################### SECURITY ####################################
[security]
admin_user = admin
admin_password = admin
secret_key = SW2YcwTIb9zpOOhoPsMm
cookie_secure = false
cookie_samesite = lax
disable_gravatar = true

#################################### USERS ####################################
[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer

#################################### ANALYTICS ####################################
[analytics]
reporting_enabled = false
check_for_updates = true

#################################### LOGGING ####################################
[log]
mode = console file
level = info

#################################### ALERTING ####################################
[alerting]
enabled = true
execute_alerts = true

#################################### INSTALL PLUGINS ####################################
# Plugin installation happens via docker-compose environment variables
# GF_INSTALL_PLUGINS=frser-sqlite-datasource,marcusolsson-gantt-panel
