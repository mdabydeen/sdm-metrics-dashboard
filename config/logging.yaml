version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(pathname)s:%(lineno)d - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: sdm-metrics.log
    maxBytes: 10485760
    backupCount: 3

root:
  level: INFO
  handlers:
    - console
    - file

loggers:
  src.ingestion:
    level: DEBUG
  src.capacity:
    level: DEBUG
